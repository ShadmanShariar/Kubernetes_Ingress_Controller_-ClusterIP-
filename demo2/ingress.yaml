apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service-ingress
spec:
  rules:
    - host: shadmanservices.com
      http:
        paths:
          - path: /service1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: demo-service1
                port:
                  number: 80

          - path: /service2(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: demo-service2
                port:
                  number: 80