      labels:
        app: demo-service2
    spec:
      containers:
        - name: demo-service2
          image: shadmanshariar007/demoservice2:2.0
          ports:
            - containerPort: 9093

---
apiVersion: v1
kind: Service
metadata:
  name: demo-service2
spec:
  selector:
